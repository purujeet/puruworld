        .bottle-neck {
            width: 40px;
            height: 80px;
            background: linear-gradient(#2e7d32, #1b5e20);
            border-radius: 10px 10px 0 0;
            border: 2px solid #1b5e20;
        }

        .bottle-main {
            width: 80px;
            height: 180px;
            background: linear-gradient(#4caf50, #2e7d32);
            border: 2px solid #1b5e20;
            border-radius: 0 0 20px 20px;

            border: none !important;

            border-radius: 8px;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.75rem;

            transition: background 0.3s, transform 0.2s, box-shadow 0.3s;

    <script>
        const colorSets = [
            {
                neck: { gradient: 'linear-gradient(#2e7d32, #1b5e20)', border: '#1b5e20' },

            },
            {
                neck: { gradient: 'linear-gradient(#d81b60, #ad1457)', border: '#ad1457' },
                main: { gradient: 'linear-gradient(#f06292, #d81b60)', border: '#ad1457' }
            },
            {
                neck: { gradient: 'linear-gradient(#0288d1, #01579b)', border: '#01579b' },
                main: { gradient: 'linear-gradient(#29b6f6, #0288d1)', border: '#01579b' }
            },
            {
                neck: { gradient: 'linear-gradient(#ff6f00, #e65100)', border: '#e65100' },
                main: { gradient: 'linear-gradient(#ffa726, #ff6f00)', border: '#e65100' }
            }
        ];

        let currentAngle = 0;

        function spinBottle() {
            const bottle = document.getElementById('bottle');
            const randomAngle = 1440 + Math.floor(Math.random() * 360);
            currentAngle += randomAngle;
            bottle.style.transform = `rotate(${currentAngle}deg)`;
        }
