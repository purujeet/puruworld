    <div class="container">
        <h1>Tic-Tac-Toe</h1>
        
        <div class="mode-selection">
            <button class="mode-btn active" id="pnp">Pass N Play</button>
            <button class="mode-btn" id="pvcpu">Player vs CPU</button>
        </div>

        <div class="status idle" id="status">Select a mode to start playing!</div>

        <div class="board" id="board">
            <div class="cell" data-index="0"></div>
            <div class="cell" data-index="1"></div>
            <div class="cell" data-index="2"></div>
            <div class="cell" data-index="3"></div>
            <div class="cell" data-index="4"></div>
            <div class="cell" data-index="5"></div>
            <div class="cell" data-index="6"></div>
            <div class="cell" data-index="7"></div>
            <div class="cell" data-index="8"></div>
        </div>

        <div class="controls">
            <div></div> <!-- Spacer -->
            <button class="reset-btn" id="reset">Reset</button>
        </div>
    </div>

    <script>
        (function() {
            // Scope the script to the game container
            const gameContainer = document.getElementById('tictactoe-game');
            if (!gameContainer) return;

            class TicTacToe {
                constructor() {
                    this.board = Array(9).fill(null);
                    this.currentPlayer = 'X';
                    this.gameMode = null;
                    this.gameActive = false;
                    this.init();
                }

                init() {
                    this.bindEvents();
                    this.updateStatus();
                }

                bindEvents() {
                    const pnpBtn = gameContainer.querySelector('#pnp');
                    const pvcpuBtn = gameContainer.querySelector('#pvcpu');
                    const cells = gameContainer.querySelectorAll('.cell');
                    const resetBtn = gameContainer.querySelector('#reset');

                    pnpBtn.addEventListener('click', () => this.setMode('pnp'));
                    pvcpuBtn.addEventListener('click', () => this.setMode('pvcpu'));

                    cells.forEach(cell => {
                        cell.addEventListener('click', (e) => this.handleCellClick(e));
                    });

                    resetBtn.addEventListener('click', () => this.reset());
                }

                setMode(mode) {
                    this.gameMode = mode;
                    gameContainer.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
                    gameContainer.querySelector(`#${mode}`).classList.add('active');
                    this.startGame();
                }

                handleCellClick(e) {
                    if (!this.gameActive || !this.gameMode) {
                        return;
                    }

                    const cell = e.target;
                    const index = parseInt(cell.dataset.index);

                    if (this.board[index] !== null) return;

                    this.makeMove(index, this.currentPlayer);
                    cell.classList.add(this.currentPlayer.toLowerCase());
                    cell.textContent = this.currentPlayer;

                    if (this.checkWinner()) {
                        this.endGame(`Player ${this.currentPlayer} wins!`);
                        return;
                    }

                    if (this.isDraw()) {
                        this.endGame("It's a draw!");
                        return;
                    }

                    this.switchPlayer();

                    if (this.gameMode === 'pvcpu' && this.currentPlayer === 'O' && this.gameActive) {
                        setTimeout(() => this.cpuMove(), 500);
                    }

                    this.updateStatus();
                }

                makeMove(index, player) {
                    this.board[index] = player;
                }

                switchPlayer() {
                    this.currentPlayer = this.currentPlayer === 'X' ? 'O' : 'X';
                }

                cpuMove() {
                    const bestMove = this.findBestMove();
                    if (bestMove === -1) return;

                    this.makeMove(bestMove, 'O');

                    const cell = gameContainer.querySelector(`[data-index="${bestMove}"]`);
                    cell.classList.add('o');
                    cell.textContent = 'O';

                    if (this.checkWinner()) {
                        this.endGame('CPU wins!');
                        return;
                    }

                    if (this.isDraw()) {
                        this.endGame("It's a draw!");
                        return;
                    }

                    this.switchPlayer();
                    this.updateStatus();
                }

                findBestMove() {
                    let bestScore = -Infinity;
                    let move = -1;

                    for (let i = 0; i < 9; i++) {
                        if (this.board[i] === null) {
                            this.board[i] = 'O';
                            let score = this.minimax(false);
                            this.board[i] = null;

                            if (score > bestScore) {
                                bestScore = score;
                                move = i;
                            }
                        }
                    }
                    return move;
                }

                minimax(isMaximizing) {
                    let winner = this.getWinner();
                    if (winner) {
                        return winner === 'O' ? 10 : -10;
                    }

                    if (this.isDraw()) {
                        return 0;
                    }

                    let bestScore = isMaximizing ? -Infinity : Infinity;

                    for (let i = 0; i < 9; i++) {
                        if (this.board[i] === null) {
                            this.board[i] = isMaximizing ? 'O' : 'X';
                            let score = this.minimax(!isMaximizing);
                            this.board[i] = null;

                            if (isMaximizing) {
                                bestScore = Math.max(score, bestScore);
                            } else {
                                bestScore = Math.min(score, bestScore);
                            }
                        }
                    }

                    return bestScore;
                }

                getWinner() {
                    const winPatterns = [
                        [0, 1, 2], [3, 4, 5], [6, 7, 8],
                        [0, 3, 6], [1, 4, 7], [2, 5, 8],
                        [0, 4, 8], [2, 4, 6]
                    ];

                    for (let pattern of winPatterns) {
                        const [a, b, c] = pattern;
                        if (this.board[a] && this.board[a] === this.board[b] && this.board[a] === this.board[c]) {
                            return this.board[a];
                        }
                    }
                    return null;
                }

                checkWinner() {
                    const winPatterns = [
                        [0, 1, 2], [3, 4, 5], [6, 7, 8],
                        [0, 3, 6], [1, 4, 7], [2, 5, 8],
                        [0, 4, 8], [2, 4, 6]
                    ];
                    for (let pattern of winPatterns) {
                        const [a, b, c] = pattern;
                        if (this.board[a] && this.board[a] === this.board[b] && this.board[a] === this.board[c]) {
                            [a, b, c].forEach(idx => {
                                const cell = gameContainer.querySelector(`[data-index="${idx}"]`);
                                if (cell) cell.classList.add('winning-cell');
                            });
                            return true;
                        }
                    }
                    return false;
                }

                isDraw() {
                    return this.board.every(cell => cell !== null);
                }

                updateStatus() {
                    const statusEl = gameContainer.querySelector('#status');
                    statusEl.classList.remove('winner', 'draw', 'idle');

                    if (!this.gameActive || !this.gameMode) {
                        statusEl.textContent = 'Select a mode to start playing!';
                        statusEl.classList.add('idle');
                        return;
                    }

                    let message;
                    if (this.currentPlayer === 'X') {
                        message = this.gameMode === 'pnp' ? "Player X's turn" : "Your turn (X)";
                    } else {
                        message = this.gameMode === 'pnp' ? "Player O's turn" : "CPU's turn (O)";
                    }

                    statusEl.textContent = message;
                }

                endGame(message) {
                    this.gameActive = false;
                    const statusEl = gameContainer.querySelector('#status');
                    statusEl.textContent = message;
                    if (message.includes('wins')) {
                        statusEl.classList.add('winner');
                    } else {
                        statusEl.classList.add('draw');
                    }
                }

                startGame() {
                    this.gameActive = true;
                    this.currentPlayer = 'X';
                    this.board.fill(null);
                    gameContainer.querySelectorAll('.cell').forEach(cell => {
                        cell.textContent = '';
                        cell.classList.remove('x', 'o', 'winning-cell');
                    });
                    this.updateStatus();
                }

                reset() {
                    gameContainer.querySelector('#status').classList.remove('winner', 'draw', 'idle');
                    this.startGame();
                }
            }

            // Initialize only if the container exists
            new TicTacToe();
        })();
    </script>
