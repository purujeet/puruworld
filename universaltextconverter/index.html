<script type="text/javascript">
        var gk_isXlsx = false;
        var gk_xlsxFileLookup = {};
        var gk_fileData = {};
        function filledCell(cell) {
          return cell !== '' && cell != null;
        }
        function loadFileData(filename) {
        if (gk_isXlsx && gk_xlsxFileLookup[filename]) {
            try {
                var workbook = XLSX.read(gk_fileData[filename], { type: 'base64' });
                var firstSheetName = workbook.SheetNames[0];
                var worksheet = workbook.Sheets[firstSheetName];

                // Convert sheet to JSON to filter blank rows
                var jsonData = XLSX.utils.sheet_to_json(worksheet, { header: 1, blankrows: false, defval: '' });
                // Filter out blank rows (rows where all cells are empty, null, or undefined)
                var filteredData = jsonData.filter(row => row.some(filledCell));

                // Heuristic to find the header row by ignoring rows with fewer filled cells than the next row
                var headerRowIndex = filteredData.findIndex((row, index) =>
                  row.filter(filledCell).length >= filteredData[index + 1]?.filter(filledCell).length
                );
                // Fallback
                if (headerRowIndex === -1 || headerRowIndex > 25) {
                  headerRowIndex = 0;
                }

                // Convert filtered JSON back to CSV
                var csv = XLSX.utils.aoa_to_sheet(filteredData.slice(headerRowIndex)); // Create a new sheet from filtered array of arrays
                csv = XLSX.utils.sheet_to_csv(csv, { header: 1 });
                return csv;
            } catch (e) {
                console.error(e);
                return "";
            }
        }
        return gk_fileData[filename] || "";
        }

    <div class="universal-text-converter">

    <script>
        const convertBtn = document.getElementById('convertBtn');
        const conversionType = document.getElementById('conversionType');
        const inputText = document.getElementById('inputText');
        const outputText = document.getElementById('outputText');
        const errorDiv = document.getElementById('error');

        // Simplified TOML parser (for basic key-value and nested structures)
        function parseToml(toml) {
            const result = {};
            const lines = toml.split('\n');
            let currentObj = result;
            let currentTable = null;

            for (let line of lines) {
                line = line.trim();
                if (line === '' || line.startsWith('#')) continue;

                if (line.startsWith('[') && line.endsWith(']')) {
                    currentTable = line.slice(1, -1).trim();
                    result[currentTable] = {};
                    currentObj = result[currentTable];
                    continue;
                }

                const [key, value] = line.split('=').map(s => s.trim());
                if (key && value) {
                    let parsedValue = value;
                    if (value.match(/^\d+$/)) {
                        parsedValue = parseInt(value);
                    } else if (value.match(/^\d+\.\d+$/)) {
                        parsedValue = parseFloat(value);
                    } else if (value === 'true' || value === 'false') {
                        parsedValue = value === 'true';
                    } else if (value.startsWith('"') && value.endsWith('"')) {
                        parsedValue = value.slice(1, -1);
                    }
                    currentObj[key] = parsedValue;
                }
            }
            return result;
        }

        function tomlToJson(toml) {
            try {
                const parsed = parseToml(toml);
                return JSON.stringify(parsed, null, 2);
            } catch (err) {
                throw new Error('Invalid TOML format.');
            }
        }

        function jsonToToml(json) {
            const data = JSON.parse(json);
            function objToToml(obj, indent = 0) {
                let result = '';
                for (const [key, value] of Object.entries(obj)) {
                    if (typeof value === 'object' && !Array.isArray(value)) {
                        result += `[${key}]\n`;
                        result += objToToml(value, indent);
                    } else {
                        let formattedValue = value;
                        if (typeof value === 'string') {
                            formattedValue = `"${value}"`;
                        } else if (typeof value === 'boolean') {
                            formattedValue = value.toString();
                        }
                        result += `${key} = ${formattedValue}\n`;
                    }
                }
                return result;
            }
            return objToToml(data).trim();
        }

        // Simplified YAML parser (for basic key-value and nested structures)
        function parseYaml(yaml) {
            const result = {};
            const lines = yaml.split('\n');
            let currentObj = result;
            let indentStack = [0];

            for (let line of lines) {
                line = line.trim();
                if (line === '' || line.startsWith('#')) continue;

                const indent = line.search(/\S/);
                const trimmed = line.trim();
                const isList = trimmed.startsWith('- ');
                
                if (isList) {
                    const value = trimmed.slice(2).trim();
                    const parentIndent = indentStack[indentStack.length - 1];
                    if (indent > parentIndent) {
                        const lastKey = Object.keys(currentObj).pop();
                        if (!Array.isArray(currentObj[lastKey])) {
                            currentObj[lastKey] = [];
                        }
                        currentObj[lastKey].push(value);
                    } else {
                        while (indent < indentStack[indentStack.length - 1]) {
                            indentStack.pop();
                            currentObj = Object.values(currentObj)[0];
                        }
                        if (!Array.isArray(currentObj)) {
                            currentObj = [];
                        }
                        currentObj.push(value);
                    }
                } else {
                    const [key, value] = trimmed.split(':').map(s => s.trim());
                    if (!value) {
                        currentObj[key] = {};
                        indentStack.push(indent);
                        currentObj = currentObj[key];
                    } else {
                        currentObj[key] = value;
                        while (indent < indentStack[indentStack.length - 1]) {
                            indentStack.pop();
                            currentObj = Object.values(currentObj)[0];
                        }
                    }
                }
            }
            return result;
        }

        function yamlToJson(yaml) {
            try {
                const parsed = parseYaml(yaml);
                return JSON.stringify(parsed, null, 2);
            } catch (err) {
                throw new Error('Invalid YAML format.');
            }
        }

        function jsonToYaml(json) {
            const data = JSON.parse(json);
            function objToYaml(obj, indent = 0) {
                let result = '';
                const indentStr = '  '.repeat(indent);
                for (const [key, value] of Object.entries(obj)) {
                    if (Array.isArray(value)) {
                        for (const item of value) {
                            result += `${indentStr}- ${item}\n`;
                        }
                    } else if (typeof value === 'object' && value !== null) {
                        result += `${indentStr}${key}:\n${objToYaml(value, indent + 1)}`;
                    } else {
                        result += `${indentStr}${key}: ${value}\n`;
                    }
                }
                return result;
            }
            return objToYaml(data).trim();
        }

        convertBtn.addEventListener('click', () => {
            const type = conversionType.value;
            const input = inputText.value.trim();
            errorDiv.textContent = '';

            if (!type) {
                errorDiv.textContent = 'Please select a conversion type.';
                return;
            }
            if (!input) {
                errorDiv.textContent = 'Please enter input text.';
                return;
            }

            try {
                let result;
                switch (type) {
                    case 'xmlToCsv':
                        result = xmlToCsv(input);
                        break;
                    case 'csvToXml':
                        result = csvToXml(input);
                        break;
                    case 'csvToJson':
                        result = csvToJson(input);
                        break;
                    case 'jsonToCsv':
                        result = jsonToCsv(input);
                        break;
                    case 'yamlToJson':
                        result = yamlToJson(input);
                        break;
                    case 'jsonToYaml':
                        result = jsonToYaml(input);
                        break;
                    case 'xmlToJson':
                        result = xmlToJson(input);
                        break;
                    case 'jsonToXml':
                        result = jsonToXml(input);
                        break;
                    case 'tomlToJson':
                        result = tomlToJson(input);
                        break;
                    case 'jsonToToml':
                        result = jsonToToml(input);
                        break;
                    default:
                        errorDiv.textContent = 'Invalid conversion type.';
                        return;
                }
                outputText.value = result;
            } catch (err) {
                errorDiv.textContent = `Error: ${err.message}`;
            }
        });

        function csvToJson(csv) {
            const lines = csv.split('\n');
            const headers = lines[0].split(',').map(h => h.trim());
            const result = [];
            for (let i = 1; i < lines.length; i++) {
                if (lines[i].trim() === '') continue;
                const values = lines[i].split(',').map(v => v.trim());
                const obj = {};
                headers.forEach((header, index) => {
                    obj[header] = values[index] || '';
                });
                result.push(obj);
            }
            return JSON.stringify(result, null, 2);
        }

        function jsonToCsv(json) {
            const data = JSON.parse(json);
            if (!Array.isArray(data) || data.length === 0) {
                throw new Error('JSON must be a non-empty array of objects.');
            }
            const headers = Object.keys(data[0]);
            let csv = headers.join(',') + '\n';
            data.forEach(obj => {
                const values = headers.map(header => obj[header] || '');
                csv += values.join(',') + '\n';
            });
            return csv.trim();
        }

        function xmlToCsv(xml) {
            const parser = new DOMParser();
            const doc = parser.parseFromString(xml, 'application/xml');
            if (doc.getElementsByTagName('parsererror').length > 0) {
                throw new Error('Invalid XML.');
            }
            const items = doc.documentElement.children;
            if (items.length === 0) {
                throw new Error('No items found in XML.');
            }
            const headers = Array.from(items[0].children).map(child => child.tagName);
            let csv = headers.join(',') + '\n';
            for (let i = 0; i < items.length; i++) {
                const values = headers.map(header => items[i].querySelector(header)?.textContent || '');
                csv += values.join(',') + '\n';
            }
            return csv.trim();
        }

        function csvToXml(csv) {
            const lines = csv.split('\n');
            const headers = lines[0].split(',').map(h => h.trim());
            let xml = '<root>\n';
            for (let i = 1; i < lines.length; i++) {
                if (lines[i].trim() === '') continue;
                const values = lines[i].split(',').map(v => v.trim());
                xml += '  <item>\n';
                headers.forEach((header, index) => {
                    xml += `    <${header}>${values[index] || ''}</${header}>\n`;
                });
                xml += '  </item>\n';
            }
            xml += '</root>';
            return xml;
        }

        function xmlToJson(xml) {
            const parser = new DOMParser();
            const doc = parser.parseFromString(xml, 'application/xml');
            if (doc.getElementsByTagName('parsererror').length > 0) {
                throw new Error('Invalid XML.');
            }
            const items = doc.documentElement.children;
            if (items.length === 0) {
                throw new Error('No items found in XML.');
            }
            const result = [];
            for (let i = 0; i < items.length; i++) {
                const obj = {};
                Array.from(items[i].children).forEach(child => {
                    obj[child.tagName] = child.textContent || '';
                });
                result.push(obj);
            }
            return JSON.stringify(result, null, 2);
        }

        function jsonToXml(json) {
            const data = JSON.parse(json);
            if (!Array.isArray(data) || data.length === 0) {
                throw new Error('JSON must be a non-empty array of objects.');
            }
            let xml = '<root>\n';
            data.forEach(obj => {
                xml += '  <item>\n';
                Object.entries(obj).forEach(([key, value]) => {
                    xml += `    <${key}>${value}</${key}>\n`;
                });
                xml += '  </item>\n';
            });
            xml += '</root>';
            return xml;
        }
