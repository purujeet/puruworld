<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orbit Drop - Production Prototype</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }
        html, body {
            margin: 0;
            padding: 0;
            background-color: #030307;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        #game-container {
            background-color: #030307;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border-radius: 8px;
            overflow: hidden;
        }
        canvas {
            background-color: #030307 !important;
            display: block;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>
    <div style="position: relative; display: flex; justify-content: center; align-items: center;">
        <div id="game-container"></div>
        
        <!-- Lobby Overlay -->
        <div id="lobby-overlay" style="display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(3,3,7,0.95); z-index: 10; flex-direction: column; justify-content: center; align-items: center; font-family: monospace; color: #ffffff; border-radius: 8px; overflow: hidden; padding: 20px; text-align: center; box-sizing: border-box;">
            <h2 style="color: #00ffcc; font-size: 28px; margin-bottom: 20px; font-weight: bold; letter-spacing: 2px;">MULTIPLAYER LOBBY</h2>
            
            <div id="lobby-create-section" style="display: none;">
                <p style="font-size: 18px; color: #ffffff; margin-bottom: 5px;">Share Room Code:</p>
                <h1 id="room-code-display" style="color: #ffcc00; font-size: 48px; letter-spacing: 8px; margin: 15px 0; font-weight: bold; background: #111125; padding: 10px 30px; border-radius: 8px; border: 1px solid #ffcc00; display: inline-block;">....</h1>
                <p style="color: #8888aa; animation: lobbyPulse 1.5s infinite; font-size: 14px; margin-top: 15px;">Waiting for player 2 to connect...</p>
            </div>
            
            <div id="lobby-join-section" style="display: none; flex-direction: column; align-items: center;">
                <p style="font-size: 18px; color: #ffffff; margin-bottom: 15px;">Enter Room Code:</p>
                <input type="text" id="room-code-input" maxlength="4" style="background: #111125; border: 2px solid #00ffcc; color: #ffffff; font-size: 32px; text-transform: uppercase; text-align: center; width: 180px; padding: 12px; border-radius: 8px; font-family: monospace; outline: none; margin-bottom: 25px; letter-spacing: 4px;">
                <button id="join-btn" style="background: #ff0055; color: #ffffff; border: none; padding: 14px 40px; font-size: 18px; font-weight: bold; border-radius: 8px; cursor: pointer; font-family: monospace; letter-spacing: 1px; transition: background 0.2s;">CONNECT</button>
            </div>
            
            <p id="lobby-status" style="color: #ff0055; margin-top: 20px; font-size: 15px; height: 20px;"></p>
            
            <button id="lobby-back-btn" style="background: transparent; color: #8888aa; border: 1px solid #8888aa; padding: 10px 25px; border-radius: 8px; cursor: pointer; margin-top: 30px; font-family: monospace; transition: all 0.2s;">LEAVE LOBBY</button>
        </div>
    </div>
    
    <style>
        @keyframes lobbyPulse {
            0% { opacity: 0.4; }
            50% { opacity: 1; }
            100% { opacity: 0.4; }
        }
        #join-btn:hover {
            background: #ff3377 !important;
        }
        #lobby-back-btn:hover {
            color: #ffffff !important;
            border-color: #ffffff !important;
            background: rgba(255,255,255,0.05);
        }
    </style>
    <!-- Floating Footer -->
    <div style="position: absolute; bottom: 10px; left: 0; width: 100%; text-align: center; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 0.8rem; color: rgba(255,255,255,0.4); z-index: 1000; pointer-events: none;">
      Powered by <a href="https://puruworld.com" target="_blank" style="color: #00ffcc; text-decoration: none; font-weight: 600; pointer-events: auto;">puruworld.com</a>
    </div>
    <script src="game.js"></script>
</body>
</html>
