<header>

        <svg style="width: 26px; height: 26px; fill: url(#accentGradient{{ID}}); flex-shrink: 0;" viewBox="0 0 24 24">

            <linearGradient id="accentGradient{{ID}}" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#8b5cf6" />
